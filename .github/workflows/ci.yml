name: 🚀 CI/CD Pipeline (Disabled)

on:
  workflow_dispatch: # Manual trigger only - DISABLED

permissions:
  contents: read
  actions: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: 1.16.25
  ANCHOR_VERSION: 0.32.1

jobs:
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🦀 Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.80.0
        profile: minimal
        override: true
        components: rustfmt, clippy
        
    - name: 📦 Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: 🌐 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: ☀️ Install Solana CLI
      run: |
        for i in {1..3}; do
          sh -c "$(curl -sSfL --retry 3 https://release.solana.com/v${{ env.SOLANA_VERSION }}/install)" && break
          echo "Retry $i failed, waiting..."
          sleep 5
        done
        echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        
    - name: ⚓ Install Anchor CLI
      run: |
        npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}
        
    - name: 📦 Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
      
    - name: 🔍 Rust format check
      run: cargo fmt --all -- --check
      continue-on-error: true
      
    - name: 📎 Rust clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      continue-on-error: true
      
    - name: 🏗️ Build program
      run: anchor build
      
    - name: 🧪 Run Rust unit tests
      run: cargo test --manifest-path programs/meteora-fee-router/Cargo.toml --verbose
      
    - name: 🔧 Setup test validator
      run: |
        solana-test-validator --version
        
    - name: 🧪 Run integration tests
      run: anchor test --skip-local-validator
      
    - name: 📊 Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          target/
          test-ledger/
          
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🦀 Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.80.0
        profile: minimal
        override: true
        
    - name: 🛡️ Install and run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0370
      continue-on-error: true

  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🦀 Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.80.0
        profile: minimal
        override: true
        
    - name: 🌐 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: ☀️ Install Solana CLI
      run: |
        for i in {1..3}; do
          sh -c "$(curl -sSfL --retry 3 https://release.solana.com/v${{ env.SOLANA_VERSION }}/install)" && break
          echo "Retry $i failed, waiting..."
          sleep 5
        done
        echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        
    - name: ⚓ Install Anchor CLI
      run: |
        npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}
        
    - name: 📦 Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
      
    - name: 🏗️ Optimized build
      run: |
        chmod +x deployment/optimize-build.sh
        ./deployment/optimize-build.sh
        
    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          target/deploy/
          target/idl/
          
